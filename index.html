<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miwa Gacha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header-card">
    <div class="logo-wrap">🎰</div>
    <h1>MIWA GACHA</h1>
    <p class="tagline">Premium Slot Experience</p>
  </div>

  <!-- Input -->
  <div class="glass-card">
    <span class="input-label">Masukkan ID Gacha</span>
    <div class="input-row">
      <div class="input-wrap">
        <input
          id="gachaId"
          type="text"
          placeholder="GCH-XXXXXXXXXXXX"
          autocomplete="off"
          spellcheck="false">
      </div>
      <button id="spinBtn" onclick="startSpin()">Cek ID</button>
    </div>
  </div>

  <!-- Info card, game area, result → diinject JS -->

  <!-- Status -->
  <div class="status-card">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text-wrap">
      <div class="status-label">Status</div>
      <div id="statusText">Masukkan ID Gacha untuk memulai...</div>
    </div>
  </div>

  <div class="footer">
    <span>Miwa &mdash; Premium Casino Engine</span>
  </div>

</div>

<!-- Game modules -->
<script src="games/slot3x3.js"></script>
<script src="games/roulette.js"></script>

<!-- Core -->
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miwa Gacha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header-card">
    <div class="logo-wrap">🎰</div>
    <h1>MIWA GACHA</h1>
    <p class="tagline">Premium Slot Experience</p>
  </div>

  <!-- Input Section -->
  <div class="glass-card">
    <span class="input-label">Masukkan ID Gacha</span>
    <div class="input-row">
      <div class="input-wrap">
        <input
          id="gachaId"
          type="text"
          placeholder="GCH-XXXXXXXXXXXX"
          autocomplete="off"
          spellcheck="false">
      </div>
      <button id="spinBtn" onclick="startSpin()">
        Spin
      </button>
    </div>
  </div>

  <!-- Slot Machine -->
  <div class="slot-card">
    <div class="slot-section-label">Slot Machine</div>

    <div class="slot-machine">

      <div class="slot-window" id="win1">
        <div class="slot-reel" id="reel1"></div>
      </div>

      <div class="slot-separator"></div>

      <div class="slot-window" id="win2">
        <div class="slot-reel" id="reel2"></div>
      </div>

      <div class="slot-separator"></div>

      <div class="slot-window" id="win3">
        <div class="slot-reel" id="reel3"></div>
      </div>

    </div>

    <!-- Payline -->
    <div class="payline-wrap">
      <div class="payline-track">
        <div class="payline-dot left"></div>
        <div class="payline-dot center"></div>
        <div class="payline-dot right"></div>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-card">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text-wrap">
      <div class="status-label">Status</div>
      <div id="statusText">Menunggu ID Gacha...</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>Miwa &mdash; Premium Casino Engine</span>
  </div>

</div>

<!-- Result Overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <span id="resultEmoji" class="result-emoji">🎉</span>
    <div id="resultBadge" class="result-badge win">● WIN</div>
    <div id="resultTitle" class="result-title">Jackpot!</div>
    <div id="resultDesc" class="result-desc">Selamat, kamu berhasil memenangkan hadiah.</div>
    <div class="result-divider"></div>
    <button class="close-btn" onclick="closeResult()">Tutup</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
